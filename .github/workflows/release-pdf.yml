name: Compile Neovim Guide PDF and Commit

on:
  push:
    branches: [ main ]
    paths:
      - 'nvim_guide.tex'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          fetch-depth: 0

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-fonts-recommended texlive-fonts-extra texlive-latex-extra

      - name: Compile LaTeX document
        run: |
          pdflatex -interaction=nonstopmode -halt-on-error nvim_guide.tex
          pdflatex -interaction=nonstopmode -halt-on-error nvim_guide.tex

      - name: Move PDF to doc directory
        run: mv nvim_guide.pdf doc/nvim_guide.pdf

      - name: Commit and push PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add doc/nvim_guide.pdf
          if git diff --staged --quiet; then
            echo "No changes to PDF, skipping commit"
          else
            git commit -m "Update compiled nvim_guide.pdf [ci skip]"
            git push origin HEAD:${{ github.ref }}
          fi

      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: nvim-guide-pdf
          path: doc/nvim_guide.pdf
          retention-days: 7
